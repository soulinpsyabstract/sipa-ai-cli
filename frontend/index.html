<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="description" content="SIPA AI — Multi-Layer Language model interface" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SIPA AI" />
  <title>SIPA AI</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">SIPA AI</span>
        </div>
        <div id="status-indicator" class="status offline">
          <span class="status-dot"></span>
          <span class="status-label">connecting…</span>
        </div>
      </div>
      <div class="header-right">
        <button id="btn-clear" class="icon-btn" title="Clear chat (or type /clear)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- MLL Layer Selector -->
    <div id="layer-bar">
      <div class="layer-scroll">
        <button class="layer-btn active" data-layer="auto">AUTO</button>
        <button class="layer-btn" data-layer="L01">L01</button>
        <button class="layer-btn" data-layer="L02">L02</button>
        <button class="layer-btn" data-layer="L03">L03</button>
        <button class="layer-btn" data-layer="L04">L04</button>
        <button class="layer-btn" data-layer="L05">L05</button>
        <button class="layer-btn" data-layer="L06">L06</button>
        <button class="layer-btn" data-layer="L07">L07</button>
        <button class="layer-btn" data-layer="L08">L08</button>
        <button class="layer-btn" data-layer="L09">L09</button>
        <button class="layer-btn" data-layer="L10">L10</button>
      </div>
      <div id="layer-info" class="layer-info hidden"></div>
    </div>

    <!-- Chat Window -->
    <main id="chat-window">
      <div id="messages">
        <div class="message ai">
          <div class="bubble">
            <p>Привет. Я SIPA AI — мультислойная языковая система.<br>Выбери слой или оставь AUTO. Задай вопрос.</p>
            <div class="meta">SIPA AI · ready</div>
          </div>
        </div>
      </div>
      <div id="typing-indicator" class="message ai hidden">
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer id="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          placeholder="Введи сообщение… (Ctrl+Enter — отправить)"
          rows="1"
          autofocus
        ></textarea>
        <button id="btn-send" title="Send (Ctrl+Enter)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hints">
        <span class="hint">Ctrl+Enter отправить</span>
        <span class="hint">/clear — очистить</span>
        <span id="session-id-label" class="hint session-id"></span>
      </div>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2>Настройки</h2>
        <button id="btn-close-settings" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <label class="setting-row">
          <span>API endpoint</span>
          <input type="text" id="setting-api" value="https://sipa-ai.sipa-os.org" />
        </label>
        <label class="setting-row">
          <span>Timeout (сек)</span>
          <input type="number" id="setting-timeout" value="90" min="10" max="300" />
        </label>
        <label class="setting-row checkbox-row">
          <span>Markdown рендер</span>
          <input type="checkbox" id="setting-markdown" checked />
        </label>
        <div class="setting-row info-row">
          <span>Session ID</span>
          <code id="modal-session-id"></code>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-save-settings" class="primary-btn">Сохранить</button>
        <button id="btn-new-session" class="secondary-btn">Новая сессия</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
